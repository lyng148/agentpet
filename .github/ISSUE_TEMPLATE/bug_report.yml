name: Bug report
description: Report something that isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 14.5 (Apple Silicon)
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which agent were you running?
      options:
        - Claude Code
        - Codex
        - Gemini CLI
        - Other / agentpet run wrapper
        - None
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Anything else?
      description: Screenshots, console output, or extra context.
