name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish app (self-contained, win-x64)
        run: >
          dotnet publish AgentPetApp/AgentPetApp.csproj
          -c Release -r win-x64 --self-contained true
          /p:PublishSingleFile=false

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" AgentPet.iss

      - name: Publish to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --title "AgentPet ${{ github.ref_name }}" --generate-notes
          }
          gh release upload "${{ github.ref_name }}" "ReleasePackage/AgentPet-Setup.exe" --clobber
